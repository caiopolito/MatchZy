name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CSSHARP_VERSION: "1.0.368"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Authenticate GitHub Packages
        run: |
          dotnet nuget update source github \
            --username caiopolito \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text

      - name: Restore dependencies
        run: dotnet restore

      - name: Build plugin
        run: dotnet publish -c Release --no-self-contained -o ./publish

      - name: Download CounterStrikeSharp with runtime
        run: |
          wget -q "https://github.com/roflmuffin/CounterStrikeSharp/releases/download/v${{ env.CSSHARP_VERSION }}/counterstrikesharp-with-runtime-linux-${{ env.CSSHARP_VERSION }}.zip" -O cssharp.zip
          unzip -q cssharp.zip -d cssharp

      - name: Assemble bundle
        run: |
          mkdir -p bundle/addons/counterstrikesharp/plugins/MatchZy

          # CS# runtime (bin, dotnet, api, gamedata, metamod VDF)
          cp -r cssharp/* bundle/

          # MatchZy plugin DLL and its deps
          cp ./publish/MatchZy.dll bundle/addons/counterstrikesharp/plugins/MatchZy/
          cp ./publish/MatchZy.deps.json bundle/addons/counterstrikesharp/plugins/MatchZy/ 2>/dev/null || true
          find ./publish -maxdepth 1 -name "*.dll" ! -name "MatchZy.dll" ! -name "CounterStrikeSharp*" \
            -exec cp {} bundle/addons/counterstrikesharp/plugins/MatchZy/ \;

          # Config files
          cp -r cfg/MatchZy bundle/addons/counterstrikesharp/configs/

      - name: Create bundle zip
        run: cd bundle && zip -r ../matchzy-with-cssharp-linux.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: matchzy-with-cssharp-linux
          path: matchzy-with-cssharp-linux.zip
          retention-days: 30
